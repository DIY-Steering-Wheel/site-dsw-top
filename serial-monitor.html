  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor Serial | DSW Wheel</title>
    <meta
      name="description"
      content="Monitor serial no navegador para conectar, enviar e receber dados pela porta serial."
    />
    <link rel="icon" href="public/logo.svg" type="image/svg+xml" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="serial">
    <nav class="navbar navbar-expand-lg site-navbar border-bottom border-secondary-subtle sticky-top">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-2 text-white fw-semibold" href="index.html">
          <img src="public/logo.svg" alt="DSW Wheel" width="42" height="42" />
          <span>DSW Wheel</span>
        </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegacao">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item"><a class="nav-link text-white-50" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link text-white-50" href="downloads.html">Downloads</a></li>
            <li class="nav-item"><a class="nav-link text-white-50" href="gamepad-test.html">Gamepad Test</a></li>
            <li class="nav-item"><a class="nav-link text-white-50" href="calculadora-torque.html">Calculadora</a></li>
            <li class="nav-item"><a class="nav-link text-white active-link" href="serial-monitor.html">Monitor Serial</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-4">
      <div class="container py-lg-3">
        <section class="hero-panel p-4 p-lg-5 mb-4">
          <span class="section-kicker">Monitor Serial</span>
          <h1 class="display-6 fw-bold mt-2 mb-3">Conecte, leia e envie dados</h1>
          <p class="text-white-50 mb-0">
            Esta pagina usa a Web Serial API. Funciona em navegadores compativeis e em contexto seguro.
          </p>
        </section>

        <section class="calculator-shell">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">Baud rate</label>
              <input id="serial-baudrate" class="form-control dark-input" type="number" value="115200" />
            </div>
            <div class="col-md-9">
              <div class="d-flex flex-wrap gap-2">
                <button id="serial-connect" class="btn btn-light" type="button">Conectar</button>
                <button id="serial-disconnect" class="btn btn-outline-light" type="button">Desconectar</button>
                <button id="serial-clear" class="btn btn-outline-light" type="button">Limpar log</button>
                <span id="serial-status" class="repo-pill">Desconectado</span>
              </div>
            </div>
          </div>

          <div class="mt-4">
            <label class="form-label">Log serial</label>
            <textarea id="serial-log" class="form-control serial-log" rows="16" readonly></textarea>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-10">
              <label class="form-label">Enviar dados</label>
              <input id="serial-output" class="form-control dark-input" type="text" placeholder="Digite um comando ou mensagem" />
            </div>
            <div class="col-md-2 d-grid">
              <label class="form-label d-none d-md-block">&nbsp;</label>
              <button id="serial-send" class="btn btn-danger" type="button">Enviar</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="py-4 border-top border-secondary-subtle">
      <div class="container text-center text-white-50">
        <p class="mb-0">&copy; 2025 DSW by Valdemir. Todos os direitos reservados.</p>
      </div>

      crossorigin="anonymous"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
